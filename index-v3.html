<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TerraRose Bloom Manager V3</title>

<style>
body {font-family: Arial; margin:0; background:#f6f6f6;}
header {background:#8b1e3f; color:white; text-align:center; padding:20px;}
.tabs{display:flex; flex-wrap:wrap; gap:10px; padding:10px;}
.tab{padding:10px; border-radius:20px; background:#ead6dc; border:none;}
.tab.active{background:#8b1e3f; color:white;}
.card{background:white; margin:12px; padding:16px; border-radius:12px;}
.alert{padding:10px; border-radius:10px; margin:8px 0; font-weight:bold;}
.red{background:#ffe5e5;}
.yellow{background:#fff4cc;}
.green{background:#e6ffe6;}
.blue{background:#e6f0ff;}
button{background:#8b1e3f; color:white; padding:10px; border:none; border-radius:8px;}
input,select{width:100%; padding:10px; margin:6px 0;}
</style>
</head>

<body>

<header>🌹 TerraRose Bloom Manager V3</header>

<div class="tabs">
<button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
<button class="tab" onclick="showTab('spray',this)">Spray</button>
<button class="tab" onclick="showTab('fert',this)">Fertilizer</button>
<button class="tab" onclick="showTab('soil',this)">Soil</button>
<button class="tab" onclick="showTab('water',this)">Irrigation</button>
<button class="tab" onclick="showTab('business',this)">Business</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card">
<h2>🚨 Alerts</h2>
<div id="alerts"></div>

<h2>🌹 Next Spray</h2>
<div id="nextSpray"></div>

<h2>💰 Summary</h2>
<div id="summary"></div>
</div>

<!-- SPRAY -->
<div id="spray" class="card" style="display:none;">
<h2>Spray Log</h2>
<input id="product" placeholder="Product">
<input id="ai" placeholder="Active Ingredient">
<input id="group" placeholder="Group">
<input type="date" id="sprayDate">
<button onclick="saveSpray()">Save</button>
</div>

<!-- FERT -->
<div id="fert" class="card" style="display:none;">
<h2>Fertilizer</h2>
<input id="fertProduct" placeholder="Product">
<input type="date" id="fertDate">
<button onclick="saveFert()">Save</button>
</div>

<!-- SOIL -->
<div id="soil" class="card" style="display:none;">
<h2>Soil</h2>
<input id="soilPH" placeholder="pH">
<input type="date" id="soilDate">
<button onclick="saveSoil()">Save</button>
</div>

<!-- WATER -->
<div id="water" class="card" style="display:none;">
<h2>Irrigation</h2>
<input id="minutes" placeholder="Minutes">
<input id="length" placeholder="Row Length">
<input id="flow" placeholder="Flow Rate">
<button onclick="calcWater()">Calculate</button>
<div id="waterResult"></div>
</div>

<!-- BUSINESS -->
<div id="business" class="card" style="display:none;">

<h3>Sales</h3>
<input id="saleItem" placeholder="Item">
<input id="saleAmount" placeholder="Amount">
<button onclick="addSale()">Add</button>
<div id="salesList"></div>

<h3>Expenses</h3>
<input id="expenseItem" placeholder="Item">
<input id="expenseAmount" placeholder="Amount">
<button onclick="addExpense()">Add</button>
<div id="expenseList"></div>

<h3>Labor</h3>
<input id="laborItem" placeholder="Task">
<input id="laborAmount" placeholder="Amount">
<button onclick="addLabor()">Add</button>
<div id="laborList"></div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("farm")) || {
spray:[], fert:[], soil:[], sales:[], expenses:[], labor:[]
};

function save(){
localStorage.setItem("farm",JSON.stringify(db));
render();
}

function showTab(tab,btn){
document.querySelectorAll('.card').forEach(c=>c.style.display='none');
document.getElementById(tab).style.display='block';
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
}

function saveSpray(){
db.spray.unshift({product:product.value, ai:ai.value, group:group.value, date:sprayDate.value});
save();
}

function saveFert(){
db.fert.unshift({product:fertProduct.value, date:fertDate.value});
save();
}

function saveSoil(){
db.soil.unshift({ph:soilPH.value, date:soilDate.value});
save();
}

function calcWater(){
let gallons = (flow.value/100)*length.value*minutes.value;
waterResult.innerHTML = gallons.toFixed(2) + " gallons";
}

function addSale(){
db.sales.unshift({item:saleItem.value, amount:Number(saleAmount.value)});
save();
}

function addExpense(){
db.expenses.unshift({item:expenseItem.value, amount:Number(expenseAmount.value)});
save();
}

function addLabor(){
db.labor.unshift({item:laborItem.value, amount:Number(laborAmount.value)});
save();
}

function render(){

// ALERTS
let alertsHTML="";
if(db.spray.length){
alertsHTML += `<div class="alert yellow">Spray program active</div>`;
if(db.spray[1] && db.spray[1].ai===db.spray[0].ai){
alertsHTML += `<div class="alert red">⚠ Same AI repeated</div>`;
}
} else {
alertsHTML += `<div class="alert red">No sprays logged</div>`;
}
alerts.innerHTML = alertsHTML;

// NEXT SPRAY
if(db.spray.length){
nextSpray.innerHTML = `<div class="alert blue">${db.spray[0].product}</div>`;
} else {
nextSpray.innerHTML = `<div class="alert red">No spray yet</div>`;
}

// BUSINESS
let salesTotal=0, expenseTotal=0, laborTotal=0;

let salesHTML="", expenseHTML="", laborHTML="";

db.sales.forEach(s=>{
salesTotal+=s.amount;
salesHTML+=`<div class="alert green">${s.item}: $${s.amount}</div>`;
});

db.expenses.forEach(e=>{
expenseTotal+=e.amount;
expenseHTML+=`<div class="alert yellow">${e.item}: $${e.amount}</div>`;
});

db.labor.forEach(l=>{
laborTotal+=l.amount;
laborHTML+=`<div class="alert yellow">${l.item}: $${l.amount}</div>`;
});

salesList.innerHTML = salesHTML;
expenseList.innerHTML = expenseHTML;
laborList.innerHTML = laborHTML;

let profit = salesTotal - expenseTotal - laborTotal;

summary.innerHTML = `
<div class="alert green">Sales: $${salesTotal}</div>
<div class="alert yellow">Expenses: $${expenseTotal}</div>
<div class="alert yellow">Labor: $${laborTotal}</div>
<div class="alert green">Profit: $${profit}</div>
`;

}

render();

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TerraRose Farm OS v13</title>
<meta name="theme-color" content="#8b1e3f" />
<style>
:root{
  --rose:#8b1e3f; --rose2:#b44b6b; --bg:#f7f1f4; --card:#fff;
  --line:#ead7de; --text:#2f2630; --muted:#76656d; --green:#2f8a57;
  --gold:#b8860b; --blue:#2a6de0; --warn:#fff4cf; --warnb:#e1b400;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;padding:18px 16px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
h1{margin:0;font-size:1.45rem}
.sub{opacity:.92;margin-top:4px;font-size:.94rem}
.wrap{max-width:1100px;margin:0 auto;padding:14px}
.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:4px;margin-bottom:14px}
.tab{white-space:nowrap;border:none;border-radius:999px;padding:12px 16px;font-weight:800;background:#ecdbe1;color:var(--rose);font-size:15px}
.tab.active{background:var(--rose);color:#fff}
.view{display:none}.view.active{display:block}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}.span-3{grid-column:span 3}
@media(max-width:820px){.span-8,.span-6,.span-4,.span-3{grid-column:span 12}}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
.kpi .label{color:var(--muted);font-size:.86rem;margin-bottom:6px}
.kpi .value{font-size:1.7rem;font-weight:900}
.green{color:var(--green)} .blue{color:var(--blue)} .gold{color:var(--gold)} .rose{color:var(--rose)}
label{display:block;font-weight:800;font-size:.92rem;margin:10px 0 5px}
input,select,textarea{width:100%;padding:13px 12px;border:1px solid #dccad1;border-radius:14px;font-size:16px;background:#fff;color:var(--text)}
textarea{min-height:96px;resize:vertical}
.btn{border:none;background:var(--rose);color:#fff;padding:13px 16px;border-radius:14px;font-weight:800;font-size:16px}
.btn.secondary{background:#efe5e8;color:var(--rose)}
.btnline{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.big-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:620px){.big-actions{grid-template-columns:1fr}}
.big-btn{border:none;border-radius:18px;padding:18px 16px;font-size:18px;font-weight:900;text-align:left;background:#fff;border:1px solid var(--line);box-shadow:0 4px 10px rgba(0,0,0,.05)}
.big-btn span{display:block;font-size:.88rem;font-weight:600;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{font-size:.8rem;text-transform:uppercase;color:var(--muted);letter-spacing:.03em}
.alert{background:var(--warn);border-left:5px solid var(--warnb);padding:12px;border-radius:12px;margin:10px 0}
.small{font-size:.88rem;color:var(--muted)}
.bar{height:13px;background:#ead8de;border-radius:999px;overflow:hidden;margin:6px 0 10px}
.fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2))}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1e4e9;color:var(--rose);font-weight:800;font-size:.8rem;margin:0 6px 6px 0}
.footer{padding:10px 0 26px;color:var(--muted);font-size:.87rem}
</style>
</head>
<body>
<header>
  <h1>🌹 TerraRose Farm OS</h1>
  <div class="sub">Field-friendly dashboard, spray reminders, profit by variety, irrigation math, and tax-ready exports.</div>
</header>
<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div id="dashboard" class="view active"></div>
  <div id="sales" class="view"></div>
  <div id="expenses" class="view"></div>
  <div id="labor" class="view"></div>
  <div id="sprays" class="view"></div>
  <div id="irrigation" class="view"></div>
  <div id="reports" class="view"></div>
  <div class="footer">This version works offline on your device. Browser notifications are local reminders. Cloud backup would need a hosted app.</div>
</div>

<script>
const KEY="terrarose-v13";
const views=[["dashboard","Dashboard"],["sales","Sales"],["expenses","Expenses"],["labor","Labor"],["sprays","Sprays"],["irrigation","Irrigation"],["reports","Reports"]];
document.getElementById("tabs").innerHTML = views.map(([id,label],i)=>`<button class="tab ${i===0?'active':''}" data-v="${id}">${label}</button>`).join("");
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setView(b.dataset.v));
function setView(v){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===v));document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.v===v))}
let db = JSON.parse(localStorage.getItem(KEY) || "{}");
db.sales ||= [];
db.expenses ||= [];
db.labor ||= [];
db.sprays ||= [];
db.irrigation ||= [];
db.settings ||= {dripGPH:0.5, emittersPerPlant:2};
function save(){localStorage.setItem(KEY,JSON.stringify(db)); renderAll();}
function today(){return new Date().toISOString().slice(0,10)}
function fmtMoney(n){return "$"+Number(n||0).toFixed(2)}
function daysFromNow(dateStr){
  const d1 = new Date(); d1.setHours(0,0,0,0);
  const d2 = new Date(dateStr+"T00:00:00");
  return Math.round((d2-d1)/86400000);
}
function addDays(dateStr, days){
  const d=new Date(dateStr+"T12:00:00"); d.setDate(d.getDate()+Number(days)); return d.toISOString().slice(0,10);
}
function byYear(dateStr){ return (dateStr||"").slice(0,4); }

function maybeNotify(){
  if(!("Notification" in window)) return;
  const due = db.sprays.map(s=>({...s,next:addDays(s.lastApplied,s.intervalDays||0)})).filter(s=>s.lastApplied && daysFromNow(s.next) <= 1 && daysFromNow(s.next) >= 0);
  if(Notification.permission==="granted" && due.length){
    const names = due.slice(0,2).map(x=>x.product).join(", ");
    new Notification("TerraRose spray reminder", {body: due.length===1 ? `${names} is due ${due[0].next}.` : `${names} and other sprays are due soon.`});
  }
}
function requestNotify(){
  if(!("Notification" in window)){ alert("Notifications are not supported in this browser."); return; }
  Notification.requestPermission().then(()=>maybeNotify());
}

function renderDashboard(){
  const totalSales = db.sales.reduce((s,x)=>s+Number(x.total||0),0);
  const totalExp = db.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const totalLabor = db.labor.reduce((s,x)=>s+Number(x.pay||0),0);
  const profit = totalSales-totalExp-totalLabor;
  const stems = db.sales.reduce((s,x)=>s+Number(x.stems||0),0);
  const dueSprays = db.sprays.map(s=>({...s,next:addDays(s.lastApplied,s.intervalDays||0)})).filter(s=>s.lastApplied).sort((a,b)=>a.next.localeCompare(b.next));
  const upcoming = dueSprays.filter(s=>daysFromNow(s.next)<=3);
  const varietyMap={};
  db.sales.forEach(s=>{ varietyMap[s.variety]=(varietyMap[s.variety]||0)+Number(s.total||0); });
  const topVar = Object.entries(varietyMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const html = `
    <div class="grid">
      <div class="span-12 card">
        <div class="big-actions">
          <button class="big-btn" onclick="setView('sales')">🌸 Record Sale<span>Add stems, customer, variety, and price</span></button>
          <button class="big-btn" onclick="setView('expenses')">🧾 Add Expense<span>Track receipts and tax categories</span></button>
          <button class="big-btn" onclick="setView('labor')">👩‍🌾 Log Labor<span>Workers, hours, rate, and pay</span></button>
          <button class="big-btn" onclick="setView('sprays')">🧴 Check Sprays<span>Upcoming reminders and rotation schedule</span></button>
        </div>
      </div>
      <div class="span-12">
        <div class="kpis">
          <div class="kpi"><div class="label">Total sales</div><div class="value green">${fmtMoney(totalSales)}</div></div>
          <div class="kpi"><div class="label">Expenses</div><div class="value rose">${fmtMoney(totalExp)}</div></div>
          <div class="kpi"><div class="label">Labor</div><div class="value gold">${fmtMoney(totalLabor)}</div></div>
          <div class="kpi"><div class="label">Net profit</div><div class="value blue">${fmtMoney(profit)}</div></div>
        </div>
      </div>
      <div class="span-6 card">
        <h3>Spray reminders</h3>
        <div class="small">Due within the next 3 days.</div>
        ${upcoming.length ? upcoming.map(s=>`<div class="alert"><strong>${s.product}</strong> • Group ${s.group || "—"}<br>Next due: ${s.next}</div>`).join("") : `<div class="small">No upcoming sprays.</div>`}
        <div class="btnline">
          <button class="btn" onclick="requestNotify()">Enable local reminders</button>
          <button class="btn secondary" onclick="setView('sprays')">Open spray planner</button>
        </div>
      </div>
      <div class="span-6 card">
        <h3>Top varieties by sales</h3>
        ${topVar.length ? topVar.map(([name,val],i)=>`<div><strong>${name || "Unlabeled"}</strong> — ${fmtMoney(val)}</div><div class="bar"><div class="fill" style="width:${Math.max(10,(val/topVar[0][1])*100)}%"></div></div>`).join("") : `<div class="small">No sales entered yet.</div>`}
      </div>
      <div class="span-4 card">
        <h3>Pricing snapshot</h3>
        <div class="pill">Stems sold: ${stems}</div>
        <div class="pill">Avg price/stem: ${fmtMoney(stems ? totalSales/stems : 0)}</div>
        <div class="pill">Profit/stem: ${fmtMoney(stems ? profit/stems : 0)}</div>
      </div>
      <div class="span-4 card">
        <h3>Irrigation defaults</h3>
        <div class="pill">${db.settings.dripGPH} GPH/emitter</div>
        <div class="pill">${db.settings.emittersPerPlant} emitters/plant</div>
        <div class="small">Used in the irrigation calculator.</div>
      </div>
      <div class="span-4 card">
        <h3>Tax export</h3>
        <div class="small">Export one clean CSV with sales, expenses, and labor.</div>
        <div class="btnline"><button class="btn" onclick="exportCSV()">Export records CSV</button><button class="btn secondary" onclick="setView('reports')">Open reports</button></div>
      </div>
    </div>`;
  document.getElementById("dashboard").innerHTML = html;
}

function renderSales(){
  document.getElementById("sales").innerHTML = `
    <div class="grid">
      <div class="span-6 card">
        <h3>Record flower sale</h3>
        <label>Date</label><input type="date" id="s_date" value="${today()}">
        <label>Customer / florist</label><input id="s_customer" placeholder="Cache Valley florist">
        <label>Variety</label><input id="s_variety" placeholder="Earth Angel">
        <label>Stems sold</label><input type="number" id="s_stems" placeholder="60">
        <label>Price per stem</label><input type="number" step="0.01" id="s_price" placeholder="3.00">
        <div class="btnline"><button class="btn" onclick="saveSale()">Save sale</button></div>
      </div>
      <div class="span-6 card">
        <h3>Recent sales</h3>
        <table><thead><tr><th>Date</th><th>Customer</th><th>Variety</th><th>Stems</th><th>Total</th></tr></thead><tbody>
          ${(db.sales.slice(0,15).map(s=>`<tr><td>${s.date||""}</td><td>${s.customer||""}</td><td>${s.variety||""}</td><td>${s.stems||0}</td><td>${fmtMoney(s.total)}</td></tr>`).join("")) || `<tr><td colspan="5">No sales yet.</td></tr>`}
        </tbody></table>
      </div>
    </div>`;
}
function saveSale(){
  const stems = Number(document.getElementById("s_stems").value||0);
  const price = Number(document.getElementById("s_price").value||0);
  db.sales.unshift({date:document.getElementById("s_date").value,customer:document.getElementById("s_customer").value,variety:document.getElementById("s_variety").value,stems,price,total:stems*price});
  save(); setView('sales');
}

function renderExpenses(){
  document.getElementById("expenses").innerHTML = `
    <div class="grid">
      <div class="span-6 card">
        <h3>Add expense</h3>
        <label>Date</label><input type="date" id="e_date" value="${today()}">
        <label>Vendor</label><input id="e_vendor" placeholder="IFA Country Store">
        <label>Category</label>
        <select id="e_cat">
          <option>Supplies</option><option>Pesticides</option><option>Fertilizer</option><option>Equipment</option>
          <option>Fuel</option><option>Repairs</option><option>Irrigation</option><option>Packaging</option><option>Other</option>
        </select>
        <label>Amount</label><input type="number" step="0.01" id="e_amt" placeholder="84.72">
        <div class="btnline"><button class="btn" onclick="saveExpense()">Save expense</button></div>
      </div>
      <div class="span-6 card">
        <h3>Recent expenses</h3>
        <table><thead><tr><th>Date</th><th>Vendor</th><th>Category</th><th>Amount</th></tr></thead><tbody>
          ${(db.expenses.slice(0,15).map(e=>`<tr><td>${e.date||""}</td><td>${e.vendor||""}</td><td>${e.category||""}</td><td>${fmtMoney(e.amount)}</td></tr>`).join("")) || `<tr><td colspan="4">No expenses yet.</td></tr>`}
        </tbody></table>
      </div>
    </div>`;
}
function saveExpense(){
  db.expenses.unshift({date:document.getElementById("e_date").value,vendor:document.getElementById("e_vendor").value,category:document.getElementById("e_cat").value,amount:Number(document.getElementById("e_amt").value||0)});
  save(); setView('expenses');
}

function renderLabor(){
  document.getElementById("labor").innerHTML = `
    <div class="grid">
      <div class="span-6 card">
        <h3>Log labor</h3>
        <label>Date</label><input type="date" id="l_date" value="${today()}">
        <label>Worker</label><input id="l_worker" placeholder="Worker name">
        <label>Hours</label><input type="number" step="0.25" id="l_hours" placeholder="6">
        <label>Hourly rate</label><input type="number" step="0.01" id="l_rate" placeholder="18">
        <div class="btnline"><button class="btn" onclick="saveLabor()">Save labor</button></div>
      </div>
      <div class="span-6 card">
        <h3>Recent labor</h3>
        <table><thead><tr><th>Date</th><th>Worker</th><th>Hours</th><th>Rate</th><th>Pay</th></tr></thead><tbody>
          ${(db.labor.slice(0,15).map(l=>`<tr><td>${l.date||""}</td><td>${l.worker||""}</td><td>${l.hours||0}</td><td>${fmtMoney(l.rate)}</td><td>${fmtMoney(l.pay)}</td></tr>`).join("")) || `<tr><td colspan="5">No labor yet.</td></tr>`}
        </tbody></table>
      </div>
    </div>`;
}
function saveLabor(){
  const hours = Number(document.getElementById("l_hours").value||0);
  const rate = Number(document.getElementById("l_rate").value||0);
  db.labor.unshift({date:document.getElementById("l_date").value,worker:document.getElementById("l_worker").value,hours,rate,pay:hours*rate});
  save(); setView('labor');
}

function renderSprays(){
  const upcoming = db.sprays.map(s=>({...s,next:addDays(s.lastApplied,s.intervalDays||0)})).filter(s=>s.lastApplied).sort((a,b)=>a.next.localeCompare(b.next));
  document.getElementById("sprays").innerHTML = `
    <div class="grid">
      <div class="span-6 card">
        <h3>Spray planner</h3>
        <label>Product</label><input id="sp_product" placeholder="Spinosad">
        <label>Mode of action group</label><input id="sp_group" placeholder="5">
        <label>Last applied date</label><input type="date" id="sp_last" value="${today()}">
        <label>Repeat interval (days)</label><input type="number" id="sp_interval" placeholder="7">
        <div class="btnline"><button class="btn" onclick="saveSpray()">Save spray schedule</button></div>
      </div>
      <div class="span-6 card">
        <h3>Upcoming spray dates</h3>
        <table><thead><tr><th>Product</th><th>Group</th><th>Next due</th><th>Status</th></tr></thead><tbody>
          ${(upcoming.map(s=>{
            const d = daysFromNow(s.next);
            const status = d < 0 ? "Overdue" : d <= 3 ? "Due soon" : "Scheduled";
            return `<tr><td>${s.product||""}</td><td>${s.group||""}</td><td>${s.next}</td><td>${status}</td></tr>`;
          }).join("")) || `<tr><td colspan="4">No spray schedules yet.</td></tr>`}
        </tbody></table>
      </div>
    </div>`;
}
function saveSpray(){
  db.sprays.unshift({product:document.getElementById("sp_product").value,group:document.getElementById("sp_group").value,lastApplied:document.getElementById("sp_last").value,intervalDays:Number(document.getElementById("sp_interval").value||0)});
  save(); setView('sprays');
}

function renderIrrigation(){
  document.getElementById("irrigation").innerHTML = `
    <div class="grid">
      <div class="span-6 card">
        <h3>Drip calculator</h3>
        <label>Minutes drip ran</label><input type="number" id="ir_minutes" placeholder="90">
        <label>Emitter GPH</label><input type="number" step="0.01" id="ir_gph" value="${db.settings.dripGPH}">
        <label>Emitters per plant</label><input type="number" id="ir_emit" value="${db.settings.emittersPerPlant}">
        <div class="btnline"><button class="btn" onclick="calcIrrigation()">Calculate water per plant</button><button class="btn secondary" onclick="saveIrrDefaults()">Save defaults</button></div>
        <div id="ir_result" class="alert" style="display:none"></div>
      </div>
      <div class="span-6 card">
        <h3>Recent irrigation runs</h3>
        <table><thead><tr><th>Date</th><th>Block</th><th>Minutes</th><th>Gal/plant</th></tr></thead><tbody>
          ${(db.irrigation.slice(0,15).map(i=>`<tr><td>${i.date||""}</td><td>${i.block||""}</td><td>${i.minutes||0}</td><td>${Number(i.galPerPlant||0).toFixed(2)}</td></tr>`).join("")) || `<tr><td colspan="4">No irrigation entries yet.</td></tr>`}
        </tbody></table>
      </div>
      <div class="span-12 card">
        <h3>Log irrigation run</h3>
        <label>Date</label><input type="date" id="ir_date" value="${today()}">
        <label>Block</label><input id="ir_block" placeholder="Block A">
        <label>Minutes run</label><input type="number" id="ir_log_minutes" placeholder="90">
        <div class="btnline"><button class="btn" onclick="saveIrrigation()">Save irrigation log</button></div>
      </div>
    </div>`;
}
function calcGal(mins,gph,emit){ return (Number(mins)/60)*Number(gph)*Number(emit); }
function calcIrrigation(){
  const mins = Number(document.getElementById("ir_minutes").value||0);
  const gph = Number(document.getElementById("ir_gph").value||0);
  const emit = Number(document.getElementById("ir_emit").value||0);
  const gal = calcGal(mins,gph,emit);
  const box = document.getElementById("ir_result");
  box.style.display='block';
  box.innerHTML = `Each rose received approximately <strong>${gal.toFixed(2)} gallons</strong>.`;
}
function saveIrrDefaults(){
  db.settings.dripGPH = Number(document.getElementById("ir_gph").value||0.5);
  db.settings.emittersPerPlant = Number(document.getElementById("ir_emit").value||2);
  save();
}
function saveIrrigation(){
  const mins = Number(document.getElementById("ir_log_minutes").value||0);
  const gal = calcGal(mins, db.settings.dripGPH, db.settings.emittersPerPlant);
  db.irrigation.unshift({date:document.getElementById("ir_date").value,block:document.getElementById("ir_block").value,minutes:mins,galPerPlant:gal});
  save(); setView('irrigation');
}

function renderReports(){
  const years = {};
  db.sales.forEach(s=>{const y=byYear(s.date); if(y){years[y]=years[y]||{sales:0,exp:0,labor:0}; years[y].sales+=Number(s.total||0);}});
  db.expenses.forEach(e=>{const y=byYear(e.date); if(y){years[y]=years[y]||{sales:0,exp:0,labor:0}; years[y].exp+=Number(e.amount||0);}});
  db.labor.forEach(l=>{const y=byYear(l.date); if(y){years[y]=years[y]||{sales:0,exp:0,labor:0}; years[y].labor+=Number(l.pay||0);}});
  const cats={}; db.expenses.forEach(e=>cats[e.category]=(cats[e.category]||0)+Number(e.amount||0));
  const variety={}; db.sales.forEach(s=>variety[s.variety]=(variety[s.variety]||0)+Number(s.total||0));
  document.getElementById("reports").innerHTML = `
    <div class="grid">
      <div class="span-12 card">
        <h3>Yearly farm profit</h3>
        <table><thead><tr><th>Year</th><th>Sales</th><th>Expenses</th><th>Labor</th><th>Profit</th></tr></thead><tbody>
          ${(Object.entries(years).sort().map(([y,v])=>`<tr><td>${y}</td><td>${fmtMoney(v.sales)}</td><td>${fmtMoney(v.exp)}</td><td>${fmtMoney(v.labor)}</td><td>${fmtMoney(v.sales-v.exp-v.labor)}</td></tr>`).join("")) || `<tr><td colspan="5">No yearly records yet.</td></tr>`}
        </tbody></table>
      </div>
      <div class="span-6 card">
        <h3>Expense categories</h3>
        ${(Object.entries(cats).map(([k,v])=>`<div><strong>${k}</strong> — ${fmtMoney(v)}</div>`).join("")) || `<div class="small">No expenses yet.</div>`}
      </div>
      <div class="span-6 card">
        <h3>Profit direction by variety</h3>
        ${(Object.entries(variety).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>`<div><strong>${k || "Unlabeled"}</strong> — ${fmtMoney(v)}</div>`).join("")) || `<div class="small">No variety sales yet.</div>`}
      </div>
      <div class="span-12 card">
        <div class="btnline"><button class="btn" onclick="exportCSV()">Export all records CSV</button></div>
      </div>
    </div>`;
}
function exportCSV(){
  const rows=[["Date","Type","Description","Amount"]];
  db.sales.forEach(s=>rows.push([s.date,"Sale",`${s.variety||""} • ${s.customer||""} • ${s.stems||0} stems`,Number(s.total||0)]));
  db.expenses.forEach(e=>rows.push([e.date,"Expense",`${e.category||""} • ${e.vendor||""}`,Number(e.amount||0)]));
  db.labor.forEach(l=>rows.push([l.date,"Labor",`${l.worker||""} • ${l.hours||0} hrs @ ${l.rate||0}`,Number(l.pay||0)]));
  const csv = rows.map(r=>r.map(x=>`"${String(x ?? "").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="terrarose_farm_records.csv"; a.click(); setTimeout(()=>URL.revokeObjectURL(url),500);
}

function renderAll(){ renderDashboard(); renderSales(); renderExpenses(); renderLabor(); renderSprays(); renderIrrigation(); renderReports(); maybeNotify(); }
renderAll();
</script>

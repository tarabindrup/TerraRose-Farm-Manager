<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TerraRose Farm Manager</title>

<style>
body{
font-family:-apple-system;
background:#f7f2f5;
margin:0;
}

header{
background:#8b1e3f;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:14px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:12px;
}

.tab{
background:#ead7de;
border:none;
padding:10px 12px;
border-radius:20px;
font-weight:bold;
color:#8b1e3f;
}

.tab.active{
background:#8b1e3f;
color:white;
}

.card{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.view{display:none;}
.view.active{display:block;}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:4px;
margin-bottom:8px;
}

button{
background:#8b1e3f;
color:white;
border:none;
padding:10px;
border-radius:10px;
font-weight:bold;
margin-top:8px;
}

.alert{padding:10px;border-radius:10px;margin-top:8px;}
.red{background:#ffe6e6;color:#b30000;}
.green{background:#e6ffe6;color:#1e7e34;}
.yellow{background:#fff7d6;color:#8a6b00;}

</style>
</head>

<body>

<header>🌹 TerraRose Farm Manager</header>

<div class="container">

<div class="tabs">
<button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
<button class="tab" onclick="showTab('spray',this)">Spray</button>
<button class="tab" onclick="showTab('fert',this)">Fertilizer</button>
<button class="tab" onclick="showTab('soil',this)">Soil</button>
<button class="tab" onclick="showTab('irrigation',this)">Irrigation</button>
</div>

<div id="dashboard" class="view active">
<div class="card">
<h3>🌹 Farm Dashboard</h3>
<div id="dashboardContent"></div>
</div>
</div>

<div id="spray" class="view">
<div class="card">
<h3>🧪 Spray Log</h3>

<label>Product</label>
<select id="product" onchange="autoFill()">
<option>Safari</option>
<option>Spinosad</option>
<option>Acephate</option>
<option>Azadirachtin</option>
<option>Propiconazole</option>
<option>Chlorothalonil</option>
<option>Mancozeb</option>
<option>Copper</option>
<option>Bacillus subtilis</option>
</select>

<label>Active Ingredient</label>
<input id="ai">

<label>IRAC</label>
<input id="irac">

<label>FRAC</label>
<input id="frac">

<label>Rotation Group</label>
<select id="group">
<option value="1">🔴 Group 1</option>
<option value="2">🟢 Group 2</option>
<option value="3">🟠 Group 3</option>
<option value="4">🔵 Group 4</option>
</select>

<label>Date</label>
<input type="date" id="sprayDate">

<button onclick="saveSpray()">Save Spray</button>

</div>
</div>

<div id="fert" class="view">
<div class="card">
<h3>🌿 Fertilizer Log</h3>

<label>Product</label>
<input id="fertProduct">

<label>Type</label>
<select id="fertType">
<option>🟢 Nitrogen</option>
<option>🌸 Bloom</option>
<option>🟠 Potassium</option>
<option>🌱 Organic</option>
</select>

<label>Method</label>
<select id="fertMethod">
<option>Soil</option>
<option>Foliar</option>
<option>Granular</option>
</select>

<label>Date</label>
<input type="date" id="fertDate">

<button onclick="saveFert()">Save Fertilizer</button>

</div>
</div>

<div id="soil" class="view">
<div class="card">
<h3>🌱 Soil Test</h3>

<label>pH</label>
<input id="ph">

<label>N</label>
<input id="n">

<label>P</label>
<input id="p">

<label>K</label>
<input id="k">

<label>Organic Matter %</label>
<input id="om">

<button onclick="saveSoil()">Save Soil Test</button>

</div>
</div><div id="irrigation" class="view">
<div class="card">
<h3>💧 Drip Irrigation Tracker</h3>

<label>Date</label>
<input type="date" id="waterDate">

<label>Row / Bed Name</label>
<input id="rowName">

<label>Row Length (feet)</label>
<input type="number" id="rowLength">

<label>Minutes Run</label>
<input type="number" id="minutesRun">

<label>Flow Rate (GPM per 100 ft)</label>
<input type="number" step="0.01" id="flowRate" value="0.4">

<label>Plants in Row (optional)</label>
<input type="number" id="plantsInRow">

<button onclick="calcWater()">Calculate Water</button>
<div id="waterResult"></div>

<button onclick="saveWater()">Save Irrigation</button>

<div id="weeklyWater"></div>
</div>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("terraroseFarmV18") || "{}")

db.sprays ||= []
db.fert ||= []
db.soil ||= []
db.water ||= []

const library = {
  "Safari": {ai:"Dinotefuran", irac:"4A", frac:"", group:"1"},
  "Spinosad": {ai:"Spinosad", irac:"5", frac:"", group:"2"},
  "Acephate": {ai:"Acephate", irac:"1B", frac:"", group:"3"},
  "Azadirachtin": {ai:"Azadirachtin", irac:"UN", frac:"", group:"4"},
  "Propiconazole": {ai:"Propiconazole", irac:"", frac:"3", group:"1"},
  "Chlorothalonil": {ai:"Chlorothalonil", irac:"", frac:"M5", group:"2"},
  "Mancozeb": {ai:"Mancozeb", irac:"", frac:"M3", group:"3"},
  "Copper": {ai:"Copper", irac:"", frac:"M1", group:"1"},
  "Bacillus subtilis": {ai:"Bacillus subtilis", irac:"", frac:"BM02", group:"4"}
}

function saveDB(){
  localStorage.setItem("terraroseFarmV18", JSON.stringify(db))
  renderDashboard()
}

function showTab(id,btn){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
  document.getElementById(id).classList.add("active")
  btn.classList.add("active")
}

function autoFill(){
  let p = document.getElementById("product").value
  let d = library[p]
  document.getElementById("ai").value = d.ai
  document.getElementById("irac").value = d.irac
  document.getElementById("frac").value = d.frac
  document.getElementById("group").value = d.group
}

function saveSpray(){
  db.sprays.unshift({
    product:product.value,
    ai:ai.value,
    irac:irac.value,
    frac:frac.value,
    group:group.value,
    date:sprayDate.value
  })
  saveDB()
  alert("Spray saved")
}

function saveFert(){
  db.fert.unshift({
    product:fertProduct.value,
    type:fertType.value,
    method:fertMethod.value,
    date:fertDate.value
  })
  saveDB()
  alert("Fertilizer saved")
}

function saveSoil(){
  db.soil.unshift({
    ph:ph.value,
    n:n.value,
    p:p.value,
    k:k.value,
    om:om.value,
    date:new Date().toISOString().slice(0,10)
  })
  saveDB()
  alert("Soil test saved")
}

function calcWater(){
  let rowFeet = Number(rowLength.value || 0)
  let mins = Number(minutesRun.value || 0)
  let rate = Number(flowRate.value || 0)
  let plants = Number(plantsInRow.value || 0)

  let gpm = (rate / 100) * rowFeet
  let totalGallons = gpm * mins
  let perPlant = plants ? totalGallons / plants : 0

  let text = "<div class='green alert'>Total water: <b>" + totalGallons.toFixed(2) + " gallons</b></div>"
  if(plants){
    text += "<div class='green alert'>Per plant: <b>" + perPlant.toFixed(2) + " gallons</b></div>"
  }

  waterResult.innerHTML = text
}

function saveWater(){
  let rowFeet = Number(rowLength.value || 0)
  let mins = Number(minutesRun.value || 0)
  let rate = Number(flowRate.value || 0)
  let plants = Number(plantsInRow.value || 0)

  let gpm = (rate / 100) * rowFeet
  let totalGallons = gpm * mins
  let perPlant = plants ? totalGallons / plants : 0

  db.water.unshift({
    date:waterDate.value,
    row:rowName.value,
    rowFeet:rowFeet,
    mins:mins,
    totalGallons:totalGallons,
    perPlant:perPlant
  })

  saveDB()
  alert("Water log saved")
}

function weeklyWaterTotal(){
  let today = new Date()
  let weekAgo = new Date()
  weekAgo.setDate(today.getDate()-7)

  let total = db.water.filter(w=>{
    return new Date(w.date) >= weekAgo
  }).reduce((sum,w)=>sum + Number(w.totalGallons || 0), 0)

  return total
}

function resistanceWarning(){
  if(db.sprays.length < 2) return ""

  let last = db.sprays[0]
  let prev = db.sprays[1]

  let alerts = ""

  if(last.ai && prev.ai && last.ai === prev.ai){
    alerts += "<div class='red alert'>⚠ Same active ingredient used 2 times in a row: " + last.ai + "</div>"
  }

  if(last.irac && prev.irac && last.irac === prev.irac){
    alerts += "<div class='red alert'>⚠ Same IRAC repeated: " + last.irac + "</div>"
  }

  if(last.frac && prev.frac && last.frac === prev.frac){
    alerts += "<div class='red alert'>⚠ Same FRAC repeated: " + last.frac + "</div>"
  }

  return alerts
}

function nextSpraySuggestion(){
  if(db.sprays.length === 0) return "<div class='yellow alert'>No sprays logged yet</div>"

  let last = db.sprays[0]
  let nextGroup = Number(last.group) + 1
  if(nextGroup > 4) nextGroup = 1

  let groupNames = {
    1:"🔴 Group 1 – Strong Knockdown",
    2:"🟢 Group 2 – Organic Reset",
    3:"🟠 Group 3 – Broad Cleanup",
    4:"🔵 Group 4 – Maintenance"
  }

  let products = Object.keys(library).filter(k => library[k].group == nextGroup)
  return "<div class='green alert'><b>Next Recommended Rotation:</b> " + groupNames[nextGroup] + "<br>Products: " + products.join(", ") + "</div>"
}

function fertReminder(){
  if(db.fert.length === 0) return "<div class='yellow alert'>No fertilizer logged yet</div>"

  let last = new Date(db.fert[0].date)
  let next = new Date(last)
  next.setDate(last.getDate()+14)

  let today = new Date()

  if(today >= next){
    return "<div class='yellow alert'>🌿 Fertilizer may be due now</div>"
  } else {
    return "<div class='green alert'>Next fertilizer check around: " + next.toISOString().slice(0,10) + "</div>"
  }
}

function soilSummary(){
  if(db.soil.length === 0) return "<div class='yellow alert'>No soil tests logged yet</div>"

  let s = db.soil[0]
  let note = "<div class='green alert'>Latest soil test — pH: " + s.ph + ", N: " + s.n + ", P: " + s.p + ", K: " + s.k + ", OM: " + s.om + "%</div>"

  if(Number(s.ph) > 7.5){
    note += "<div class='yellow alert'>⚠ Soil pH is high. Consider sulfur / acidifier if appropriate.</div>"
  }

  return note
}

function renderDashboard(){
  dashboardContent.innerHTML =
    nextSpraySuggestion() +
    resistanceWarning() +
    fertReminder() +
    soilSummary() +
    "<div class='green alert'>💧 Weekly water total: <b>" + weeklyWaterTotal().toFixed(2) + " gallons</b></div>"
}

autoFill()
renderDashboard()
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TerraRose Farm Manager</title>

<style>
body{
font-family:Arial;
background:#f6f7f8;
margin:0;
padding:0;
}

header{
background:#8b1e3f;
color:white;
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.container{
padding:16px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:16px;
}

.tab{
background:#ead7de;
border:none;
padding:10px 14px;
border-radius:18px;
font-weight:bold;
color:#8b1e3f;
}

.tab.active{
background:#8b1e3f;
color:white;
}

.card{
background:white;
padding:16px;
border-radius:12px;
margin-bottom:16px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#8b1e3f;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
}

.view{
display:none;
}

.view.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #eee;
padding:8px;
text-align:left;
}

</style>
</head>

<body>

<header>🌹 TerraRose Farm Manager</header>

<div class="container">

<div class="tabs">
<button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
<button class="tab" onclick="showTab('sales',this)">Sales</button>
<button class="tab" onclick="showTab('expenses',this)">Expenses</button>
<button class="tab" onclick="showTab('labor',this)">Labor</button>
<button class="tab" onclick="showTab('irrigation',this)">Irrigation</button>
<button class="tab" onclick="showTab('spray',this)">Spray Program</button>
<button class="tab" onclick="showTab('tax',this)">Tax Reports</button>
</div>

<div id="dashboard" class="view active">
<div class="card">
<h2>Dashboard</h2>
<p>Your farm summary will appear here.</p>
</div>
</div>

<div id="sales" class="view">
<div class="card">
<h2>Sales</h2>

<label>Date</label>
<input type="date">

<label>Customer</label>
<input>

<label>Variety</label>
<input>

<label>Stems</label>
<input type="number">

<label>Price per stem</label>
<input type="number">

<button>Save Sale</button>

</div>
</div>

<div id="expenses" class="view">
<div class="card">
<h2>Expenses</h2>

<label>Date</label>
<input type="date">

<label>Vendor</label>
<input>

<label>Category</label>
<select>
<option>Supplies</option>
<option>Pesticides</option>
<option>Fertilizer</option>
<option>Equipment</option>
<option>Fuel</option>
</select>

<label>Amount</label>
<input type="number">

<button>Save Expense</button>

</div>
</div>

<div id="labor" class="view">
<div class="card">
<h2>Labor</h2>

<label>Date</label>
<input type="date">

<label>Worker</label>
<input>

<label>Hours</label>
<input type="number">

<label>Rate</label>
<input type="number">

<button>Save Labor</button>

</div>
</div>

<div id="irrigation" class="view">
<div class="card">
<h2>Irrigation</h2>

<label>Minutes drip ran</label>
<input type="number">

<label>Emitters per plant</label>
<input type="number">

<label>GPH per emitter</label>
<input type="number">

<button>Calculate Water</button>

</div>
</div>

<div id="spray" class="view">
<div class="card">
<h2>Spray Program</h2>

<label>Date</label>
<input type="date">

<label>Product Used</label>
<input>

<label>Active Ingredient</label>
<input>

<label>Rotation Group</label>
<input>

<button>Save Spray</button>

</div>
</div>

<div id="tax" class="view">
<div class="card">
<h2>Tax Reports</h2>
<p>Farm tax summaries will appear here.</p>
</div>
</div>

</div>

<script>

function showTab(id,btn){

document.querySelectorAll(".view").forEach(v=>{
v.classList.remove("active")
})

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
})

document.getElementById(id).classList.add("active")
btn.classList.add("active")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TerraRose Farm Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f6f7f8;
margin:0;
padding:0;
}

header{
background:#8b1e3f;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#8b1e3f;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
margin-top:10px;
}

input{
padding:10px;
width:100%;
margin-top:5px;
margin-bottom:10px;
}

.alert{
background:#ffe6e6;
padding:10px;
border-radius:6px;
color:#b30000;
margin-top:10px;
}

.good{
background:#e6ffe6;
padding:10px;
border-radius:6px;
color:#1e7e34;
margin-top:10px;
}

</style>

</head>

<body>

<header>
🌹 TerraRose Farm Manager
</header>

<div class="container">

<div class="card">

<h3>Log Spray</h3>

<label>Date</label>
<input type="date" id="sprayDate">

<label>Rotation Group</label>
<input type="number" id="group" min="1" max="4">

<label>Product Used</label>
<input type="text" id="product">

<button onclick="logSpray()">Save Spray</button>

</div>

<div class="card">

<h3>Spray Dashboard</h3>

<div id="dashboard"></div>

</div>

</div>

<script>

let sprayLog = JSON.parse(localStorage.getItem("sprayLog") || "[]")

function logSpray(){

let date = document.getElementById("sprayDate").value
let group = parseInt(document.getElementById("group").value)
let product = document.getElementById("product").value

sprayLog.push({
date:date,
group:group,
product:product
})

localStorage.setItem("sprayLog",JSON.stringify(sprayLog))

updateDashboard()

}

function addDays(date,days){

let result = new Date(date)
result.setDate(result.getDate()+days)
return result

}

function updateDashboard(){

if(sprayLog.length===0){
document.getElementById("dashboard").innerHTML="No sprays logged yet."
return
}

let last = sprayLog[sprayLog.length-1]

let lastDate = new Date(last.date)

let nextDate = addDays(lastDate,7)

let nextGroup = last.group + 1

if(nextGroup>4){
nextGroup=1
}

let today = new Date()

let warning=""

if(sprayLog.length>1){

let prev = sprayLog[sprayLog.length-2]

if(prev.group===last.group){
warning="<div class='alert'>⚠ Resistance warning: same spray group repeated.</div>"
}

}

let soilReminder=""

let soilDate = addDays(lastDate,28)

if(today > soilDate){

soilReminder="<div class='alert'>🌱 Soil treatment due (nematodes or azadirachtin drench).</div>"

}

document.getElementById("dashboard").innerHTML=

"<div class='good'>Last Spray: "+last.date+"</div>"+

"<div>Product: "+last.product+"</div>"+

"<div>Group Used: "+last.group+"</div>"+

"<div><strong>Next Spray Due: "+nextDate.toDateString()+"</strong></div>"+

"<div>Recommended Rotation Group: "+nextGroup+"</div>"+

warning+

soilReminder

}

updateDashboard()

</script>

</body>

</html>

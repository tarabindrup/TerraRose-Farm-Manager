<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TerraRose Bloom Manager</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f6f6f6;
}

header{
  background:#8b1e3f;
  color:white;
  text-align:center;
  padding:20px;
  font-size:22px;
}

.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.tab{
  padding:10px 14px;
  border-radius:20px;
  background:#ead6dc;
  border:none;
}

.tab.active{
  background:#8b1e3f;
  color:white;
}

.card{
  background:white;
  margin:12px;
  padding:16px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.alert{
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  font-weight:bold;
}

.red{background:#ffe5e5;}
.yellow{background:#fff4cc;}
.green{background:#e6ffe6;}
.blue{background:#e6f0ff;}

button{
  background:#8b1e3f;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header>🌹 TerraRose Bloom Manager</header>

<div class="tabs">
<button class="tab active" onclick="showTab('dashboard',this)">Dashboard</button>
<button class="tab" onclick="showTab('spray',this)">Spray</button>
<button class="tab" onclick="showTab('fert',this)">Fertilizer</button>
<button class="tab" onclick="showTab('soil',this)">Soil</button>
<button class="tab" onclick="showTab('water',this)">Irrigation</button>
<button class="tab" onclick="showTab('business',this)">Business</button>
</div>

<!-- DASHBOARD -->
    <div id="dashboard" class="card">
  <strong>Mode:</strong>
  <span id="modeDisplay"></span>

<h2>🚨 Alerts</h2>
<div id="alerts"></div>

<h2>🌹 Next Spray</h2>
<div id="nextSpray"></div>

<h2>💰 Business Snapshot</h2>
<div id="profit"></div>

</div>

<!-- SPRAY -->
<div id="spray" class="card" style="display:none;">
<h2>Spray Log</h2>

<input id="product" placeholder="Product">
<input id="ai" placeholder="Active Ingredient">
<input id="irac" placeholder="IRAC">
<input id="frac" placeholder="FRAC">

<select id="group">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<input type="date" id="sprayDate">

<button onclick="saveSpray()">Save Spray</button>
</div>

<!-- FERTILIZER -->
<div id="fert" class="card" style="display:none;">
<h2>Fertilizer</h2>

<input id="fertDate" type="date">
<input id="fertProduct" placeholder="Product">

<button onclick="saveFert()">Save</button>
</div>

<!-- SOIL -->
<div id="soil" class="card" style="display:none;">
<h2>Soil Test</h2>

<input id="soilDate" type="date">
<input id="ph" placeholder="pH">

<button onclick="saveSoil()">Save</button>
</div>

<!-- WATER -->
<div id="water" class="card" style="display:none;">
<h2>Irrigation</h2>

<input id="minutes" placeholder="Minutes">
<input id="length" placeholder="Row Length">
<input id="flow" placeholder="Flow Rate">

<button onclick="calcWater()">Calculate</button>

<div id="waterResult"></div>
</div>

<!-- BUSINESS -->
<div id="business" class="card" style="display:none;">
<h2>Business</h2>

<input id="sales" placeholder="Sales">
<input id="expenses" placeholder="Expenses">
<input id="labor" placeholder="Labor">

<button onclick="saveBiz()">Save</button>
</div>

<script>

let db = JSON.parse(localStorage.getItem("farm")) || {spray:[],fert:[],soil:[],biz:{}};

function showTab(tab,btn){
document.querySelectorAll('.card').forEach(c=>c.style.display='none');
document.getElementById(tab).style.display='block';

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
}

function saveSpray(){
db.spray.unshift({
product:product.value,
ai:ai.value,
irac:irac.value,
frac:frac.value,
group:group.value,
date:sprayDate.value
});
save();
}

function saveFert(){
db.fert.unshift({date:fertDate.value,product:fertProduct.value});
save();
}

function saveSoil(){
db.soil.unshift({date:soilDate.value,ph:ph.value});
save();
}

function saveBiz(){
db.biz={
sales:Number(sales.value),
expenses:Number(expenses.value),
labor:Number(labor.value)
};
save();
}

function calcWater(){
let gallons = (flow.value/100)*length.value*minutes.value;
waterResult.innerHTML = gallons.toFixed(2) + " gallons";
}

function save(){
localStorage.setItem("farm",JSON.stringify(db));
render();
}

function render(){

let alertsHTML="";

if(db.spray.length){
let last=db.spray[0];
alertsHTML += `<div class="alert yellow">Next spray due soon</div>`;

if(db.spray[1] && db.spray[1].ai===last.ai){
alertsHTML += `<div class="alert red">⚠ Same active ingredient repeated</div>`;
}
}

alerts.innerHTML = alertsHTML || "No alerts";

let next = db.spray.length ? db.spray[0] : null;

if(next){
  nextSpray.innerHTML = `
    <div class="alert blue">
      <strong>${next.product}</strong><br>
      AI: ${next.ai}<br>
      Mode: aggressive
    </div>
  `;
} else {
  nextSpray.innerHTML = `<div class="alert red">No spray yet</div>`;
}
if(db.biz.sales){
let profit = db.biz.sales - db.biz.expenses - db.biz.labor;
profit.innerHTML = "Profit: $" + profit;
}

}

render();

</script>
</body>
</html>
